{% extends "base.html" %}
{% block title %}
{% endblock title %}
{% block content %}
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-table/1.24.1/bootstrap-table.min.css"
            onerror="this.onerror=function(){this.onerror=null;this.href='https://unpkg.com/bootstrap-table@1.24.1/dist/bootstrap-table.min.css';};this.href='https://cdn.jsdelivr.net/npm/bootstrap-table@1.24.1/dist/bootstrap-table.min.css';">
    <div class="content">
        <div id="title" class="text-center mb-4">
            <p class="text-success">
                <strong>
                    {% block table_title %}
                    {% endblock table_title %}
                </strong>
            </p>
        </div>
        <div id="toolbar"></div>
        {% block table %}
        {% endblock table %}
    </div>
{% endblock content %}
{% block script %}
{% endblock script %}
